<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <meta
      name="description"
      content="claudebot web UI — chat with your claudebot workspace."
    />
    <meta name="theme-color" content="#fafaf9" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#161618" media="(prefers-color-scheme: dark)" />
    <link rel="icon" type="image/png" sizes="32x32" href="/brand/claudebot_favicon_32.png" />
    <link rel="icon" type="image/png" sizes="73x75" href="/brand/claudebot_icon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/brand/claudebot_apple_touch.png" />
    <style>
      html,
      body,
      #root {
        height: 100%;
      }

      body {
        margin: 0;
        background: #ffffff;
        color: #0a0a0a;
        font-family:
          system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, "Noto Sans", "Noto Sans SC",
          "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei",
          sans-serif;
      }

      html.dark body {
        background: #1a1a1a;
        color: #fafafa;
      }

      .boot-splash {
        display: flex;
        height: 100%;
        align-items: center;
        justify-content: center;
      }

      .boot-splash-inner {
        display: flex;
        align-items: center;
        gap: 10px;
        color: rgba(255, 255, 255, 0.74);
        font-size: 14px;
      }

      html:not(.dark) .boot-splash-inner {
        color: rgba(10, 10, 10, 0.64);
      }

      .boot-dot {
        width: 8px;
        height: 8px;
        border-radius: 9999px;
        background: currentColor;
        opacity: 0.75;
        animation: boot-pulse 1s ease-in-out infinite;
      }

      @keyframes boot-pulse {
        0%,
        100% {
          transform: scale(0.9);
          opacity: 0.45;
        }
        50% {
          transform: scale(1);
          opacity: 0.85;
        }
      }
    </style>
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("claudebot-webui.theme");
          var dark =
            stored === "dark" ||
            (!stored &&
              window.matchMedia &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          if (dark) document.documentElement.classList.add("dark");
        } catch {}
      })();
    </script>
    <title>claudebot</title>
  </head>
  <body class="bg-background text-foreground antialiased">
    <div id="root">
      <div class="boot-splash">
        <div class="boot-splash-inner">
          <span class="boot-dot" aria-hidden="true"></span>
          <span>Loading claudebot...</span>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
